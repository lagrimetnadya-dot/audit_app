 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        input {
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
        }

        button {
            background: #22d3ee;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #06b6d4;
        }
    </style>
</head>

<body>

<div class="box">
    <h2 style="text-align:center;">Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>

        <!-- ✅ password optional -->
        <input type="password" name="password" placeholder="Password (optional)">

        <button type="submit">Enter</button>
    </form>
</div>

</body>
</html>
